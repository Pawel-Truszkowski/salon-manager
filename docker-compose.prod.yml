services:

  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - .env.prod
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    env_file:
      - .env.prod
    volumes:
      - static_files:/app/static
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uv run python src/manage.py migrate &&
             uv run python src/manage.py collectstatic --noinput &&
             uv run gunicorn salon_manager.wsgi:application
             --bind 0.0.0.0:8000
             --workers 3
             --timeout 120"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "2108:2108"
    environment:
      CERTBOT_EMAIL: pawel.truszkowski14@gmail.com
      CERTBOT_DOMAIN: royalbeauty-studiourody.pl
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/static:ro         # nginx serwuje statyki bezpośrednio
      - media_files:/app/media:ro
      - certbot_certs:/etc/letsencrypt:ro   # certyfikaty SSL
    depends_on:
      - web

volumes:
  postgres_prod_data:
  static_files:
  media_files:
  certbot_certs:
  