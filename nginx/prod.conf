
# Cloudflare terminuje SSL — do nas przychodzi już zwykłe HTTP na porcie 2108
 
server {
    listen 2108;
    server_name royalbeauty-studiourody.pl www.royalbeauty-studiourody.pl;
 
    # Pliki statyczne serwowane bezpośrednio przez nginx
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
 
    location /media/ {
        alias /app/media/;
        expires 7d;
    }
 
    # Cały pozostały ruch → Gunicorn
    location / {
        proxy_pass          http://web:8000;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
 
        # Mówimy Django że połączenie przyszło przez HTTPS
        # (Cloudflare zdejmuje SSL przed wysłaniem do nas)
        proxy_set_header    X-Forwarded-Proto https;
 
        proxy_read_timeout  120s;
    }
}
 